<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Impact Hub</title>
    <link rel="stylesheet" href="style.css">
    <script src="//unpkg.com/three"></script>
    <script src="//unpkg.com/globe.gl"></script>
</head>
<body>

    <div id="main-page" class="page">
        <header>
            <h1 class="sketch-title">Global Organizations</h1>
            <p class="sketch-sub">Interactive Map</p>
        </header>

        <div id="globeViz"></div>

        <div class="bottom-controls">
            <button class="sketch-btn" onclick="showPage('list-page')">TO VIEW ALL</button>
        </div>
    </div>

    <div id="details-page" class="page hidden">
        <div class="nav-header">
            <button class="back-btn" onclick="showPage('main-page')">← BACK</button>
        </div>
        
        <h1 id="org-name" class="sketch-title">Name</h1>
        <h2 id="org-location" class="sketch-location">City, Country</h2>

        <div class="content-grid">
            <div class="image-section">
                <div class="img-box main-img">Image</div>
                <div class="img-row">
                    <div class="img-box thumb">Image</div>
                    <div class="img-box thumb">Image</div>
                </div>
                <div class="img-box wide-img">Images</div>
            </div>

            <div class="info-section">
                <div class="description-blob">
                    <p id="org-description">Description text goes here...</p>
                </div>
                
                <div class="donation-card">
                    <p>Donations will go towards:</p>
                    <ul id="org-needs">
                        <li>Food</li>
                        <li>Water</li>
                    </ul>
                    
                    <div class="goal-box">
                        <p>Goal: <span id="org-goal">$0</span></p>
                    </div>

                    <div class="action-row">
                        <button class="donate-btn">DONATE NOW!</button>
                        <div class="raised-box">
                            What we have raised so far: <span id="org-raised">$0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="list-page" class="page hidden">
        <button class="back-btn" onclick="showPage('main-page')">← BACK</button>
        <h1 class="sketch-title">All Locations</h1>
        <div id="org-list" class="list-grid"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
